<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Lección | EstudiandoAndo</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@400;500;600;700&family=Homemade+Apple&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
    <link href="responsive.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'ea-cream': '#F9F9F9',
                        'ea-dark': '#0A0A0A',
                    },
                    fontFamily: {
                        serif: ['"Cormorant Garamond"', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        .text-serif { font-family: 'Cormorant Garamond', serif; }
        
        /* Animaciones para feedback y transiciones */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.4s ease-in-out; }
        .shake-horizontal { animation: shake 0.4s ease-in-out; }
        
        .flash-green { transition: background-color 0.2s ease; background-color: rgba(34, 197, 94, 0.1) !important; }
        .flash-red { transition: background-color 0.2s ease; background-color: rgba(239, 68, 68, 0.1) !important; }
        
        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: pop 0.3s ease-out forwards; }
        
        @keyframes heart-break {
            0% { transform: scale(1); opacity: 1; }
            20% { transform: scale(1.3) rotate(-10deg); }
            40% { transform: scale(1.3) rotate(10deg); }
            100% { transform: scale(0); opacity: 0; filter: grayscale(100%); }
        }
        .animate-heart-break { animation: heart-break 0.6s ease-out forwards; }
        
        @keyframes star-pop {
            0% { transform: scale(0) rotate(-45deg); opacity: 0; }
            70% { transform: scale(1.2) rotate(10deg); opacity: 1; }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }
        .animate-star-pop { animation: star-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }
        
        .feedback-bar {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(100%);
        }
        .feedback-bar.show { transform: translateY(0); }

        /* Teclado Virtual */
        .vk-btn {
            @apply bg-white dark:bg-neutral-800 border border-black/10 dark:border-white/10 rounded-lg px-3 py-2 text-lg font-medium shadow-sm hover:bg-gray-50 dark:hover:bg-neutral-700 active:scale-95 transition-all text-center;
        }
    </style>
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        function exitLesson() {
            const p = new URLSearchParams(window.location.search);
            const lang = p.get('lang') || 'en';
            if (lang === 'fr') window.location.href = 'curso-frances.html';
            else window.location.href = 'curso-ingles.html';
        }
    </script>
</head>
<body class="bg-white dark:bg-neutral-950 text-ea-dark dark:text-white font-sans selection:bg-black selection:text-white transition-colors duration-300 h-screen flex flex-col overflow-hidden">

    <!-- Top Bar: Close, Progress, Lives -->
    <header class="w-full max-w-4xl mx-auto px-4 sm:px-8 py-6 flex items-center justify-between gap-4 sm:gap-8 shrink-0">
        <a href="javascript:exitLesson()" class="w-10 h-10 rounded-full hover:bg-black/5 dark:hover:bg-white/10 flex items-center justify-center transition-colors text-black/50 dark:text-white/50 hover:text-black dark:hover:text-white">
            <span class="material-symbols-outlined text-[28px]">close</span>
        </a>
        
        <div class="flex-1 bg-gray-200 dark:bg-neutral-800 rounded-full h-4 overflow-hidden border border-black/5 dark:border-white/5 mx-2">
            <div id="progress-bar" class="bg-blue-600 h-full rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
        </div>
        
        
    </header>

    <!-- Main Content: Exercise Area -->
    <!-- pb-28 reserves space for the fixed bottom bar so content never hides behind it -->
    <main class="flex-1 w-full max-w-3xl mx-auto px-4 sm:px-8 pt-4 sm:pt-10 pb-28 flex flex-col overflow-y-auto" id="exercise-container">
        <!-- JS will inject exercise here -->
    </main>

    <!-- Bottom Bar: fixed panel, always visible, swaps between Check and Feedback -->
    <div class="fixed bottom-0 left-0 right-0 z-40">

        <!-- Feedback Panel (hidden by default, slides up) -->
        <div id="feedback-bar" class="feedback-bar hidden">
            <div class="max-w-4xl mx-auto px-4 sm:px-8 py-4 flex flex-row items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <div id="feedback-icon-container" class="w-12 h-12 rounded-full flex items-center justify-center bg-white/20 shrink-0">
                        <span id="feedback-icon" class="material-symbols-outlined text-[28px]">check</span>
                    </div>
                    <div>
                        <h3 id="feedback-title" class="text-xl font-bold leading-tight">¡Correcto!</h3>
                        <p id="feedback-subtitle" class="text-xs font-medium opacity-80 hidden mt-0.5">Solución: —</p>
                    </div>
                </div>
                <button id="btn-continue" aria-label="Continuar a la siguiente pregunta" class="shrink-0 px-8 py-3 rounded-2xl font-bold text-base shadow-sm hover:opacity-90 active:scale-95 transition-all uppercase tracking-wider focus:outline-none focus:ring-4 focus:ring-white/50">
                    Continuar
                </button>
            </div>
        </div>

        <!-- Normal Check Button -->
        <div id="check-bar" class="border-t border-black/10 dark:border-white/10 bg-white dark:bg-neutral-950">
            <div class="max-w-4xl mx-auto px-4 sm:px-8 py-4 flex justify-end">
                <button id="btn-check" aria-label="Comprobar respuesta" aria-disabled="true" class="w-full sm:w-48 bg-gray-200 text-gray-400 dark:bg-neutral-800 dark:text-neutral-500 cursor-not-allowed px-8 py-4 rounded-2xl font-bold text-lg uppercase tracking-wider transition-colors focus:outline-none focus:ring-4 focus:ring-blue-500/50">
                    Comprobar
                </button>
            </div>
        </div>

    </div>



    
    <!-- Success Modal -->
    <div id="modal-success" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm hidden items-center justify-center p-4">
        <!-- Confetti wrapper -->
        <div class="absolute inset-0 pointer-events-none overflow-hidden" id="confetti-container"></div>
        
        <div class="bg-white dark:bg-neutral-900 border border-black/10 dark:border-white/10 p-8 sm:p-10 rounded-[32px] shadow-2xl max-w-md w-full text-center animate-pop relative z-10">
            <h2 class="text-3xl font-bold mb-2 text-ea-dark dark:text-white">¡Lección Completada!</h2>
            
            <!-- Stars UI -->
            <div class="flex justify-center gap-2 my-6" id="success-stars-container">
                <div class="star-icon w-12 h-12 flex items-center justify-center text-4xl grayscale opacity-30 drop-shadow-md transition-all">⭐</div>
                <div class="star-icon w-14 h-14 flex items-center justify-center text-5xl grayscale opacity-30 drop-shadow-md transition-all -mt-4">⭐</div>
                <div class="star-icon w-12 h-12 flex items-center justify-center text-4xl grayscale opacity-30 drop-shadow-md transition-all">⭐</div>
            </div>

            <div class="max-w-xs mx-auto mb-8 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800/50 p-6 rounded-2xl flex flex-col items-center shadow-sm">
                <span class="text-4xl mb-2 drop-shadow-sm">🎯</span>
                <span class="text-xs font-bold uppercase tracking-widest opacity-60 text-green-600 dark:text-green-500 mb-1">Precisión General</span>
                <span class="text-3xl font-bold text-green-600 dark:text-green-400" id="summary-accuracy">100%</span>
            </div>
            
            <div id="achievements-container" class="mb-8 hidden">
                <h4 class="text-xs font-bold uppercase tracking-widest opacity-40 mb-3">Nuevos Logros</h4>
                <div class="flex flex-col gap-2" id="achievements-list"></div>
            </div>

            <button onclick="exitLesson()" class="w-full block bg-black dark:bg-white text-white dark:text-black py-4 rounded-xl text-lg font-bold shadow-sm hover:scale-105 transition-transform border border-transparent">
                Continuar
            </button>
        </div>
    </div>


    
    <script src="leccion.js"></script>
</body>
</html>
